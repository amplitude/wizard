name: Behavioral Tests

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bdd:
    name: BDD Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      # Share the node_modules cache key with build.yml (job_build / job_lint).
      # When build.yml has already run on this PR / branch the cache is warm
      # and pnpm install is a no-op.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run BDD tests
        run: pnpm test:bdd
