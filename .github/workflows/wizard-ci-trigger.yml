name: Wizard CI Trigger

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to post the hint comment on'
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ============================================================================
  # POST WELCOME: First-time hint with all available apps
  # ============================================================================
  post-welcome:
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch available apps from wizard-workbench
        id: fetch-apps
        env:
          GH_TOKEN: ${{ secrets.WIZARD_WORKBENCH_TOKEN }}
        run: |
          # Fetch app categories from wizard-workbench repo
          CATEGORIES=$(curl -s "https://api.github.com/repos/amplitude/wizard-workbench/contents/apps" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            | jq -r '[.[] | select(.type == "dir") | .name] | sort | .[]')

          # Build lists by category
          CATEGORY_LIST=""
          APP_LIST_VISIBLE=""
          APP_LIST_COLLAPSED=""
          APP_COUNT=0
          VISIBLE_COUNT=3

          for category in $CATEGORIES; do
            # Fetch apps in this category
            APPS=$(curl -s "https://api.github.com/repos/amplitude/wizard-workbench/contents/apps/$category" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              | jq -r '[.[] | select(.type == "dir") | .name] | sort | .[]' 2>/dev/null || echo "")

            if [ -n "$APPS" ]; then
              # Add to category list
              CATEGORY_LIST="$CATEGORY_LIST- \`/wizard-ci $category\`\n"

              # Add apps to visible or collapsed list
              for app in $APPS; do
                if [ $APP_COUNT -lt $VISIBLE_COUNT ]; then
                  APP_LIST_VISIBLE="$APP_LIST_VISIBLE- \`/wizard-ci $category/$app\`\n"
                else
                  APP_LIST_COLLAPSED="$APP_LIST_COLLAPSED- \`/wizard-ci $category/$app\`\n"
                fi
                APP_COUNT=$((APP_COUNT + 1))
              done
            fi
          done

          # Use heredoc for multiline outputs
          {
            echo "categories<<EOF"
            echo -e "$CATEGORY_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "apps_visible<<EOF"
            echo -e "$APP_LIST_VISIBLE"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "apps_collapsed<<EOF"
            echo -e "$APP_LIST_COLLAPSED"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post wizard-ci hint
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CATEGORIES_OUTPUT: ${{ steps.fetch-apps.outputs.categories }}
          APPS_VISIBLE_OUTPUT: ${{ steps.fetch-apps.outputs.apps_visible }}
          APPS_COLLAPSED_OUTPUT: ${{ steps.fetch-apps.outputs.apps_collapsed }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const categories = process.env.CATEGORIES_OUTPUT || '';
            const appsVisible = process.env.APPS_VISIBLE_OUTPUT || '';
            const appsCollapsed = process.env.APPS_COLLAPSED_OUTPUT || '';
            const inputPrNumber = process.env.PR_NUMBER;

            const bodyParts = [
              '## 🧙 Wizard CI',
              '',
              'Run the Wizard CI and test your changes against [wizard-workbench](https://github.com/amplitude/wizard-workbench) example apps by replying with a GitHub comment using one of the following commands:',
              '',
              '**Test all apps:**',
              '- `/wizard-ci all`',
              '',
              '**Test all apps in a directory:**',
              categories.trim(),
              '',
              '**Test an individual app:**',
              appsVisible.trim()
            ];

            if (appsCollapsed.trim()) {
              bodyParts.push('');
              bodyParts.push('<details>');
              bodyParts.push('<summary>Show more apps</summary>');
              bodyParts.push('');
              bodyParts.push(appsCollapsed.trim());
              bodyParts.push('</details>');
            }

            bodyParts.push('');
            bodyParts.push('Results will be posted here when complete.');

            const body = bodyParts.join('\n');

            const prNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(inputPrNumber, 10)
              : context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

  # ============================================================================
  # HANDLE COMMAND: Parse /wizard-ci and trigger workflow
  # ============================================================================
  handle-command:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/wizard-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Parse command and trigger
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.WIZARD_WORKBENCH_TOKEN }}
          script: |
            // Get PR details first to check state
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });

            // Only allow triggers on open PRs (including drafts)
            if (pr.data.state !== 'open') {
              console.log(`PR is ${pr.data.state}, skipping trigger`);
              return;
            }

            const comment = context.payload.comment.body;
            const match = comment.match(/\/wizard-ci\s+(\S+)/);
            const app = match ? match[1] : 'all';

            // React with rocket to show we're processing
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

            // Trigger wizard-ci on wizard-workbench
            await github.rest.repos.createDispatchEvent({
              owner: 'Amplitude',
              repo: 'wizard-workbench',
              event_type: 'wizard-ci-trigger',
              client_payload: {
                app: app,
                source: 'wizard-pr',
                source_repo: 'wizard',
                source_pr_number: context.payload.issue.number,
                source_pr_url: pr.data.html_url,
                wizard_ref: pr.data.head.ref,
                notify_slack: 'false',
                notify_pr: 'true'
              }
            });

            console.log(`Triggered wizard-ci for app: ${app}`);

  # ============================================================================
  # AUTO-TRIGGER: Fire wizard-ci automatically when framework-related files
  # change. Runs on PR open + new pushes. Complements the manual /wizard-ci
  # comment workflow (both can fire independently).
  # ============================================================================
  auto-trigger-on-framework-changes:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Need full history so we can diff against the PR base.
          fetch-depth: 0

      - name: Detect framework-related file changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Diff only the files changed in this PR.
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "--- changed files ---"
          echo "$CHANGED"
          echo "---------------------"

          MATCHED=false
          while IFS= read -r file; do
            case "$file" in
              src/frameworks/*|\
              skills/integration/*|\
              src/lib/agent-runner.ts|\
              src/lib/framework-config.ts|\
              src/lib/registry.ts)
                MATCHED=true
                break
                ;;
            esac
          done <<< "$CHANGED"

          echo "matched=$MATCHED" >> "$GITHUB_OUTPUT"
          if [ "$MATCHED" = "true" ]; then
            echo "Framework-related files changed — will auto-trigger wizard-ci"
          else
            echo "No framework-related files changed — skipping auto-trigger"
          fi

      - name: Auto-trigger wizard-ci and post comment
        if: steps.detect.outputs.matched == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.WIZARD_WORKBENCH_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Only auto-trigger on open PRs (including drafts).
            if (pr.state !== 'open') {
              console.log(`PR is ${pr.state}, skipping auto-trigger`);
              return;
            }

            // Dispatch the workbench workflow — mirrors handle-command
            // payload but uses app='all' as the default for an auto-run. Wrapped in
            // try/catch so token permission issues don't block the PR — the
            // comment-based /wizard-ci flow still works as a fallback.
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'Amplitude',
                repo: 'wizard-workbench',
                event_type: 'wizard-ci-trigger',
                client_payload: {
                  app: 'all',
                  source: 'wizard-pr-auto',
                  source_repo: 'wizard',
                  source_pr_number: pr.number,
                  source_pr_url: pr.html_url,
                  wizard_ref: pr.head.ref,
                  notify_slack: 'false',
                  notify_pr: 'true'
                }
              });
              console.log(`Auto-triggered wizard-ci for PR #${pr.number} (app: all)`);
            } catch (err) {
              console.warn(`Auto-trigger failed (falling back to /wizard-ci comment flow): ${err.message}`);
              return;
            }

            // Only post the explanatory comment on 'opened' — on 'synchronize'
            // the PR already has a post-welcome comment and we don't want to
            // spam every push.
            if (context.payload.action !== 'opened') {
              return;
            }

            const body = [
              '## 🧙 Wizard CI — auto-triggered',
              '',
              'This PR modifies framework-related files, so `wizard-ci` was automatically dispatched against **all** workbench apps.',
              '',
              'Results will be posted here when complete. You can also re-run manually at any time with `/wizard-ci <app>`.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
